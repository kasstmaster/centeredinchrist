<!DOCTYPE html>
<html>
<head>
  <title>Live Service</title>
  <link rel="icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #0e0e0e;
      color: white;
      margin: 0;
      padding: 0;
    }
    
    .header {
      width: 100%;
      padding: 25px 0;
      border-bottom: 1px solid #333;
      font-family: 'Cinzel', serif;
      font-size: 26px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    
    h1 {
      font-size: 28px;
      margin-top: 20px;
    }
    
    h2 {
      font-size: 22px;
    }
    
    p {
      font-size: 18px;
      line-height: 1.5;
    }
    
    .video-wrapper {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
    }
    
    .video-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    
    /* Images */
    .responsive-img {
      width: 100%;
      max-width: 600px;
      border-radius: 8px;
      margin-top: 0px;
    }
    
    /* Mobile adjustments */
    @media (max-width: 600px) {
      h1 {
        font-size: 32px;
      }
    
      h2 {
        font-size: 24px;
      }
    
      p {
        font-size: 20px;
      }
    
      .header {
        font-size: 22px;
      }
    
      iframe {
        height: 220px;
      }
    }

    .sticky-video {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: #000;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    }
    
    .sticky-video .video-wrapper {
      padding-top: 40%;
    }
    
    @media (max-width: 600px) {
      .sticky-video .video-wrapper {
        padding-top: 50%;
      }
    }

    #liveIndicator {
      position: fixed;
      top: 15px;
      left: 15px;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 8px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: bold;
      z-index: 2000;
      cursor: pointer;
      backdrop-filter: blur(6px);
      transition: all 0.2s ease;
    }

    #liveIndicator.live {
      box-shadow: 0 0 10px rgba(0,255,100,0.7);
    }
    
    #liveIndicator:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <div id="liveIndicator" onclick="scrollToVideo()">
    🔴 OFFLINE
  </div>

  <div class="header">
    Centered in Christ Ministries
  </div>

  <h1 style="margin-top: 20px;">
    Online Services
  </h1>
  
  <h2 id="status">
    Live Streams Services - Sundays 2:00PM PST
  </h2>
  <div id="topContent"></div>
  <div id="bottomContent" style="padding: 0 10px;"></div>

  <script>
    const API_KEY = "AIzaSyA7bU3MKozwte7W_jOXq-uz8ccBmddkp28";
    const CHANNEL_ID = "UCubyomJfZo_C11A5fxRWnGw";

    const bottomHTML = `
      <div style="margin-top: 25px;">
      
        <br><br><br>
         <p style="font-size: 32px; font-weight: bold; margin-bottom: 6px;">
          Local Services
         </p>
            
          <div style="position: relative; max-width: 600px; margin: 0 auto;">
        
          <img 
            src="https://i.postimg.cc/vTJFyZb8/Screenshot-2026-04-26-at-5-33-59-PM.png" 
            class="responsive-img"
          >
    
          <div style="
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 8px;
            background: rgba(0,0,0,0.4);
          "></div>
    
          <div style="
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            text-align: center;
            width: 90%;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
          ">
            <p style="font-size: 18px; margin-bottom: 10px;">
              3509 Mt Pinos Way<br>
              Frazier Park, CA<br>
              Doors open Sundays at 1:30PM
            </p>
          </div>
    
          <div style="
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            width: 90%;
            justify-content: center;
          ">
          
            <a href="https://maps.google.com/?q=3509+Mt+Pinos+Way+Frazier+Park+CA" target="_blank"
              style="background: white; color: black; padding: 12px; border-radius: 10px; text-decoration: none; font-size: 15px; font-weight: bold; text-shadow: none; flex: 1; max-width: 180px; text-align: center;">
              Open in Maps
            </a>
          
            <button onclick="navigator.clipboard.writeText('3509 Mt Pinos Way, Frazier Park, CA'); this.innerText='Copied!'; setTimeout(() => this.innerText='Copy Address', 1500);"
              style="background: rgba(0,0,0,0.7); color: white; padding: 12px; border-radius: 10px; border: 1px solid white; font-size: 15px; cursor: pointer; flex: 1; max-width: 180px;">
              Copy Address
            </button>
          
          </div>
    
        </div>
    
        <br><br><br>
        
        While you’re here, explore the rest Frazier Park!<br>
        
        <a href="https://pinemountainclub.com/frazier-park.html" target="_blank" style="display: inline-block; margin-top: 20px;">
          <div style="position: relative; width: 100%; max-width: 600px; margin: 0 auto;">
            <img src="https://i.postimg.cc/Y0bGDT77/frazier-park-footer.jpg" style="width: 100%; border-radius: 8px;">
            <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 25px; font-weight: bold; text-align: center; text-shadow: 0 2px 10px rgba(0,0,0,0.8);">
              Discover Frazier Park
            </div>
          </div>
        </a><br><br><br>
      </div>
    `;

    const bottom = document.getElementById("bottomContent");
    bottom.innerHTML = bottomHTML;

    const top = document.getElementById("topContent");
    const indicator = document.getElementById("liveIndicator");

    top.innerHTML = `
      <div style="margin-top: 30px; opacity: 0.7;">
        Loading latest service...
      </div>
    `;
    
    indicator.textContent = "🔴 OFFLINE";
    indicator.classList.remove("live");

    async function loadLatestVideo() {
      const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CHANNEL_ID}&maxResults=1&order=date&type=video&key=${API_KEY}`;
      let data;
      
      try {
        const res = await fetch(url);
        data = await res.json();
      } catch (err) {
        console.error("YouTube API failed:", err);
      
        const top = document.getElementById("topContent");
        top.innerHTML = `
          <div style="margin-top: 30px;">
            <p style="opacity: 0.8;">Unable to load latest service</p>
            <a href="https://www.youtube.com/channel/${CHANNEL_ID}" target="_blank"
              style="display:inline-block;margin-top:10px;background:#fff;color:#000;padding:12px 20px;border-radius:20px;text-decoration:none;font-weight:bold;">
              Visit YouTube Channel
            </a>
          </div>
        `;
        return;
      }
    
      if (data.items && data.items.length > 0) {
        const video = data.items[0];
        const videoId = video.id.videoId;
        const title = video.snippet.title;
        const thumbnail = video.snippet.thumbnails.high.url;
      
        const top = document.getElementById("topContent");
      
        top.innerHTML = `
          <div style="margin-top: 30px;">
            <p style="font-size: 18px; opacity: 0.8; margin-bottom: 12px;">
              Watch our latest service
            </p>
      
            <a href="https://www.youtube.com/watch?v=${videoId}" target="_blank" style="text-decoration: none; color: white;">
              
              <div style="position: relative; max-width: 700px; margin: 0 auto;">
                
                <img src="${thumbnail}" style="width: 100%; border-radius: 10px;">
                
                <div style="
                  position: absolute;
                  top: 50%;
                  left: 50%;
                  transform: translate(-50%, -50%);
                  font-size: 50px;
                  opacity: 0.9;
                ">
                  ▶
                </div>
      
              </div>
      
              <p style="margin-top: 10px; font-size: 16px;">
                ${title}
              </p>
      
            </a>
          </div>
        `;
      } else {
        const top = document.getElementById("topContent");
      
        top.innerHTML = `
          <div style="margin-top: 30px;">
            <p style="opacity: 0.8;">Unable to load latest service</p>
            <a href="https://www.youtube.com/channel/${CHANNEL_ID}" target="_blank"
              style="display:inline-block;margin-top:10px;background:#fff;color:#000;padding:12px 20px;border-radius:20px;text-decoration:none;font-weight:bold;">
              Visit YouTube Channel
            </a>
          </div>
        `;
      }
    }
    
    async function checkLive() {
      const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CHANNEL_ID}&eventType=live&type=video&key=${API_KEY}`;
      let data;
      
      try {
        const res = await fetch(url);
        data = await res.json();
      } catch (err) {
        console.error("Live check failed:", err);
      
        loadLatestVideo();
        return;
      }
    
      const top = document.getElementById("topContent");
      const status = document.getElementById("status");
      const indicator = document.getElementById("liveIndicator");
    
      if (data.items && data.items.length > 0) {
        const videoId = data.items[0].id.videoId;
    
        status.textContent = "🟢 Live Service";
        indicator.textContent = "🟢 LIVE SERVICE";
        indicator.classList.add("live");
    
        top.innerHTML = `
          <div class="sticky-video">
            <div class="video-wrapper">
              <iframe src="https://www.youtube.com/embed/${videoId}" allowfullscreen></iframe>
            </div>
          </div>
        `;
    
      } else {
        status.innerHTML = `
          Live Streams every Sunday at 2:00PM PST
        `;
        indicator.textContent = "🔴 OFFLINE";
        indicator.classList.remove("live");
      
        loadLatestVideo();
      }
    }

    function scrollToVideo() {
      const top = document.getElementById("topContent");
      top.scrollIntoView({ behavior: "smooth" });
    }
  </script>

</body>
</html>
