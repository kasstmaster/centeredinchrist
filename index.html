<!DOCTYPE html>
<html>
<head>
  <title>Centered in Christ Ministries</title>
  <link rel="icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #0e0e0e;
      color: white;
      margin: 0;
      padding: 0;
    }
    
    .header {
      width: 100%;
      padding: 25px 0;
      border-bottom: 1px solid #333;
      font-family: 'Cinzel', serif;
      font-size: 28px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    
    h1 {
      font-size: 26px;
      margin-top: 20px;
    }
    
    h2 {
      font-size: 18px;
      font-weight: normal;
    }

    h2 strong {
      font-weight: bold;
    }
    
    p {
      font-size: 18px;
      line-height: 1.5;
    }
    
    .video-wrapper {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
    }
    
    .video-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    
    /* Images */
    .responsive-img {
      width: 100%;
      max-width: 600px;
      border-radius: 8px;
      margin-top: 0px;
    }
    
    /* Mobile adjustments */
    @media (max-width: 600px) {
      h1 {
        font-size: 28px;
      }
    
      h2 {
        font-size: 18px;
        font-weight: normal;
      }
    
      p {
        font-size: 20px;
      }
    
      .header {
        font-size: 24px;
      }
    
      iframe {
        height: 220px;
      }
    }

    .sticky-video {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: #000;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    }
    
    .sticky-video .video-wrapper {
      padding-top: 40%;
    }
    
    @media (max-width: 600px) {
      .sticky-video .video-wrapper {
        padding-top: 50%;
      }
    }

    #liveIndicator {
      position: fixed;
      top: 15px;
      left: 15px;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 8px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: bold;
      z-index: 5000;
      cursor: pointer;
      backdrop-filter: blur(6px);
      transition: all 0.2s ease;
    }

    #liveIndicator.live {
      box-shadow: 0 0 10px rgba(0,255,100,0.7);
    }
    
    #liveIndicator:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <div id="liveIndicator" onclick="scrollToVideo()">
    🔴 STREAM IS OFFLINE
  </div>

  <div class="header">
    <br>Centered in Christ Ministries
  </div>

  <h1 style="margin-top: 20px;">
    <br>Online Services
  </h1>
  
  <h2 id="status">
    <strong>Live Stream Services</strong><br>Watch here or on YouTube<br>every Sunday at 2:00PM PST
  </h2>
  <div id="topContent"></div>
  <div id="bottomContent" style="padding: 0 10px;"></div>

  <script>
    const API_KEY = "AIzaSyA7bU3MKozwte7W_jOXq-uz8ccBmddkp28";
    const CHANNEL_ID = "UCubyomJfZo_C11A5fxRWnGw";

    const bottomHTML = `
      <div style="margin-top: 25px;">

          <br><h1 style="margin-top: 20px;">
            Local Services
          </h1>
            
          <div style="position: relative; max-width: 600px; margin: 0 auto;">
        
          <img 
            src="https://i.postimg.cc/vTJFyZb8/Screenshot-2026-04-26-at-5-33-59-PM.png" 
            class="responsive-img"
          >
    
          <div style="
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 8px;
            background: rgba(0,0,0,0.4);
          "></div>
    
          <div style="
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            text-align: center;
            width: 90%;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
          ">
          <p style="font-size: 18px; margin-bottom: 12px;">
            3509 Mt Pinos Way<br>
            Frazier Park, CA<br>
            Doors open Sundays at 1:30PM
          </p>
          
          <div style="
            display: flex;
            gap: 10px;
            justify-content: center;
          ">
          
            <a href="https://maps.google.com/?q=3509+Mt+Pinos+Way+Frazier+Park+CA" target="_blank"
              style="background: #fff; color: #000; padding: 12px; border-radius: 10px; text-decoration: none; font-size: 15px; font-weight: bold; text-shadow: none; flex: 1; max-width: 180px; text-align: center;">
              Open in Maps
            </a>
          
            <button onclick="navigator.clipboard.writeText('3509 Mt Pinos Way, Frazier Park, CA'); this.innerText='Copied!'; setTimeout(() => this.innerText='Copy Address', 1500);"
              style="background: #fff; color: #000; padding: 12px; border-radius: 10px; border: none; font-size: 15px; cursor: pointer; flex: 1; max-width: 180px;">
              Copy Address
            </button>
          
          </div>
          </div>
    
        </div>
    
        <br><br><br>
        
        <a href="#" onclick="openModal(); return false;" style="display: inline-block; margin-top: 20px;">
          <div style="position: relative; width: 100%; max-width: 600px; margin: 0 auto;">
            <img src="https://i.postimg.cc/Y0bGDT77/frazier-park-footer.jpg" style="width: 100%; border-radius: 8px;">
            <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 25px; font-weight: bold; text-align: center; text-shadow: 0 2px 10px rgba(0,0,0,0.8);">
              Discover Frazier Park
            </div>
          </div>
        </a><br><br><br>
      </div>
    `;

    const bottom = document.getElementById("bottomContent");
    bottom.innerHTML = bottomHTML;
    
    async function checkLive() {
      const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CHANNEL_ID}&eventType=live&type=video&key=${API_KEY}`;
      const res = await fetch(url);
      const data = await res.json();
    
      const top = document.getElementById("topContent");
      const status = document.getElementById("status");
      const indicator = document.getElementById("liveIndicator");
    
      if (data.items && data.items.length > 0) {
        const videoId = data.items[0].id.videoId;
    
        status.textContent = "🟢 Now Streaming";
        indicator.textContent = "🟢 NOW STREAMING";
        indicator.classList.add("live");
    
        top.innerHTML = `
          <div class="sticky-video">
            <div class="video-wrapper">
              <iframe src="https://www.youtube.com/embed/${videoId}" allowfullscreen></iframe>
            </div>
          </div>
        `;
    
      } else {
        status.innerHTML = `<strong>Live Stream Services</strong><br>Watch here or on YouTube<br>every Sunday at 2:00PM PST`;
        indicator.textContent = "🔴 STREAM IS OFFLINE";
        indicator.classList.remove("live");
    
        top.innerHTML = `
          <a href="https://www.youtube.com/@CenteredinChristMinistries/featured" target="_blank"
            style="display: flex; align-items: center; justify-content: center; gap: 8px; background: #fff; color: #000; padding: 14px; border-radius: 12px; text-decoration: none; font-weight: bold; font-size: 15px; width: 100%; max-width: 600px; margin: 0 auto;">
            
            <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" style="width: 18px; height: 18px;">
            Services & Worship
          </a><div style="height: 12px;"></div>

          <a href="https://www.youtube.com/@CenteredinChristMinistries/community" target="_blank"
            style="display: flex; align-items: center; justify-content: center; gap: 8px; background: #fff; color: #000; padding: 14px; border-radius: 12px; text-decoration: none; font-weight: bold; font-size: 15px; width: 100%; max-width: 600px; margin: 0 auto;">
            
            <img src="https://i.postimg.cc/283Gtj2K/80eec35b-7a6d-42f5-a704-117197714e28-removebg-preview.png" style="width: 18px;">
            Online Fellowship
          </a>
          </div>
        `;
      }
    }

    function scrollToVideo() {
      const top = document.getElementById("topContent");
      top.scrollIntoView({ behavior: "smooth" });
    }

    function openModal() {
      document.getElementById("modal").style.display = "flex";
    }
    
    function closeModal() {
      document.getElementById("modal").style.display = "none";
    }
        
    checkLive();
    setInterval(checkLive, 30000);
  </script>

  <div id="modal" style="
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    z-index: 3000;
    justify-content: center;
    align-items: center;
  ">
  
    <div style="
      position: relative;
      width: 90%;
      max-width: 800px;
      height: 80%;
      background: #000;
      border-radius: 10px;
      overflow: hidden;
    ">
  
    <button onclick="closeModal()" style="
      position: fixed;
      top: 20px;
      right: 20px;
      background: #ff3b3b;
      color: white;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      font-size: 20px;
      cursor: pointer;
      z-index: 4000;
      box-shadow: 0 0 10px rgba(255,0,0,0.6);
    ">✕</button>
  
      <iframe 
        src="https://pinemountainclub.com/frazier-park.html"
        style="width: 100%; height: 100%; border: none;">
      </iframe>
  
    </div>
  </div>
  
</body>
</html>
