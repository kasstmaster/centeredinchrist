<!DOCTYPE html>
<html>
<head>
  <title>Live Service</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #0e0e0e;
      color: white;
    }
    iframe {
      width: 90%;
      height: 500px;
      border: none;
    }
    .header {
      width: 100%;
      padding: 25px 0;
      border-bottom: 1px solid #333;
      font-family: 'Cinzel', serif;
      font-size: 26px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="header">
    Centered in Christ Ministries
  </div>

  <h1 id="status">🔴 Live Service</h1>
  <div id="content">Checking livestream...</div>

  <script>
    const API_KEY = "AIzaSyA7bU3MKozwte7W_jOXq-uz8ccBmddkp28";
    const CHANNEL_ID = "UCubyomJfZo_C11A5fxRWnGw";

    async function checkLive() {
      const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CHANNEL_ID}&eventType=live&type=video&key=${API_KEY}`;
      const res = await fetch(url);
      const data = await res.json();

      const container = document.getElementById("content");
      const status = document.getElementById("status");

      if (data.items && data.items.length > 0) {
        const videoId = data.items[0].id.videoId;
      
        status.textContent = "🟢 Live Service";
      
        container.innerHTML = `
          <iframe src="https://www.youtube.com/embed/${videoId}" allowfullscreen></iframe>
        `;
      } else {
        status.textContent = "🔴 Live Service";
      
        container.innerHTML = `
          <h2>We are currently offline</h2>
          <p>Join us live Sundays at 2:00PM</p>
      
          <div style="margin-top: 20px;">
            <p>Come worship with us in person::</p>
            <p>
              3509 Mt Pinos Way<br>
              Frazier Park, CA
            </p>
          </div>
        `;
      }
    }
    
    checkLive();
    setInterval(checkLive, 30000);
  </script>

</body>
</html>
