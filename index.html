<!DOCTYPE html>
<html>
<head>
  <title>Live Service</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #0e0e0e;
      color: white;
      margin: 0;
      padding: 0 10px;
    }
    
    .header {
      width: 100%;
      padding: 25px 0;
      border-bottom: 1px solid #333;
      font-family: 'Cinzel', serif;
      font-size: 26px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    
    h1 {
      font-size: 28px;
      margin-top: 20px;
    }
    
    h2 {
      font-size: 24px;
    }
    
    p {
      font-size: 18px;
      line-height: 1.5;
    }
    
    iframe {
      width: 100%;
      max-width: 800px;
      height: 450px;
      border: none;
    }
    
    /* Images */
    .responsive-img {
      width: 100%;
      max-width: 600px;
      border-radius: 8px;
      margin-top: 15px;
    }
    
    /* Mobile adjustments */
    @media (max-width: 600px) {
      h1 {
        font-size: 32px;
      }
    
      h2 {
        font-size: 26px;
      }
    
      p {
        font-size: 20px;
      }
    
      .header {
        font-size: 22px;
      }
    
      iframe {
        height: 220px;
      }
    }
  </style>
</head>
<body>

  <div class="header">
    Centered in Christ Ministries
  </div>

  <h1 id="status">🔴 Live Service</h1>
  <div id="content">Checking livestream...</div>

  <script>
    const API_KEY = "AIzaSyA7bU3MKozwte7W_jOXq-uz8ccBmddkp28";
    const CHANNEL_ID = "UCubyomJfZo_C11A5fxRWnGw";

    async function checkLive() {
      const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CHANNEL_ID}&eventType=live&type=video&key=${API_KEY}`;
      const res = await fetch(url);
      const data = await res.json();

      const container = document.getElementById("content");
      const status = document.getElementById("status");

      if (data.items && data.items.length > 0) {
        const videoId = data.items[0].id.videoId;
      
        status.textContent = "🟢 Live Service";
      
        container.innerHTML = `
          <iframe src="https://www.youtube.com/embed/${videoId}" allowfullscreen></iframe>
        `;
      } else {
        status.textContent = "🔴 Live Service";
      
        container.innerHTML = `
          <h2>We are currently offline</h2>
          <p>Join us live Sundays at 2:00PM</p>
      
          <div style="margin-top: 20px;">
            <p>Come worship with us in person:</p>
            <p><a href="https://maps.google.com/?q=3509+Mt+Pinos+Way+Frazier+Park+CA" target="_blank">
              3509 Mt Pinos Way<br>
              Frazier Park, CA
            <br>
            <img src="https://i.postimg.cc/vTJFyZb8/Screenshot-2026-04-26-at-5-33-59-PM.png" class="responsive-img">
            </p></a><br><br>
            
            <a href="https://pinemountainclub.com/frazier-park.html" target="_blank" style="display: inline-block; margin-top: 20px;">
              <div style="position: relative; width: 100%; max-width: 600px; margin: 0 auto;">
                <img 
                  src="https://i.postimg.cc/Y0bGDT77/frazier-park-footer.jpg" 
                  style="
                    width: 100%;
                    border-radius: 8px;
                  "
                >
            
                <div style="
                  position: absolute;
                  top: 50%;
                  left: 50%;
                  transform: translate(-50%, -50%);
                  color: white;
                  font-size: 25px;
                  font-weight: bold;
                  text-align: center;
                  text-shadow: 0 2px 10px rgba(0,0,0,0.8);
                ">
                  Discover Frazier Park
                </div>
              </div>
            </a>
          </div>
        `;
      }
    }
    
    checkLive();
    setInterval(checkLive, 30000);
  </script>

</body>
</html>
